name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          for secret_name in \
            RELEASE_KEYSTORE_BASE64 \
            RELEASE_KEYSTORE_PASSWORD \
            RELEASE_KEY_ALIAS \
            RELEASE_KEY_PASSWORD
          do
            if [ -z "${!secret_name}" ]; then
              echo "Missing GitHub Secret: ${secret_name}" >&2
              exit 1
            fi
          done
          mkdir -p "${RUNNER_TEMP}/keystore"
          echo "${RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/keystore/release.jks"
          echo "RELEASE_KEYSTORE_PATH=${RUNNER_TEMP}/keystore/release.jks" >> "${GITHUB_ENV}"

      - name: Validate and build release APK
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew test lint assembleRelease

      - name: Prepare release asset
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          APK_SOURCE="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*arm64-v8a*.apk' | head -n 1)"
          if [ -z "${APK_SOURCE}" ]; then
            echo "No arm64-v8a release APK found" >&2
            exit 1
          fi
          APK_NAME="jiucaihua-${TAG_NAME}-arm64-v8a.apk"
          cp "${APK_SOURCE}" "${APK_NAME}"
          echo "APK_NAME=${APK_NAME}" >> "${GITHUB_ENV}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_NAME }}
          generate_release_notes: true
